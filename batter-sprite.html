<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batter Animation — Sprite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Subtle rule line */
    #rule-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 0.5px;
      background: #1a1a1a;
    }

    #replay-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: none;
      border: 0.5px solid #444;
      border-radius: 4px;
      color: #555;
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 20px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      z-index: 100;
    }
    #replay-btn:hover { color: #888; border-color: #666; }
  </style>
</head>
<body>

<div id="stage">
  <div id="rule-line"></div>
</div>
<button id="replay-btn">Replay</button>

<script>
  const TOTAL_FRAMES = 59;
  const USE_FRAMES = 58;
  const FRAME_W_PRECISE = 40706 / TOTAL_FRAMES;
  const FRAME_W = Math.round(FRAME_W_PRECISE);
  const FRAME_H = 307;

  // Display height — sized to feel similar to the SVG version (~110px tall)
  const displayH = 110;
  const displayW = Math.round(FRAME_W * (displayH / FRAME_H));

  // Position: rule line at 62% down, batter feet on it, starting at ~38% across
  const RULE_Y = Math.round(window.innerHeight * 0.62);
  const BATTER_X = Math.round(window.innerWidth * 0.38);

  const FPS = 18;
  const FRAME_DURATION = 1000 / FPS;

  // Set rule line position
  document.getElementById('rule-line').style.top = RULE_Y + 'px';

  let canvas = null;
  let animActive = false;

  function runAnimation() {
    // Remove existing canvas if replaying
    if (canvas) { canvas.remove(); canvas = null; }
    animActive = true;

    const dpr = window.devicePixelRatio || 1;

    canvas = document.createElement('canvas');
    canvas.width = displayW * dpr;
    canvas.height = displayH * dpr;
    canvas.style.position = 'absolute';
    canvas.style.left = BATTER_X + 'px';
    canvas.style.top = (RULE_Y - displayH) + 'px';
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    canvas.style.imageRendering = 'auto';
    document.getElementById('stage').appendChild(canvas);

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    const img = new Image();
    img.src = 'spritesheet.png';

    let currentFrame = 0;
    let lastFrameTime = 0;
    let completed = false;

    img.onload = () => {
      function tick(ts) {
        if (completed || !animActive) return;
        if (!lastFrameTime) lastFrameTime = ts;

        if (ts - lastFrameTime >= FRAME_DURATION) {
          lastFrameTime = ts;
          ctx.clearRect(0, 0, displayW, displayH);
          ctx.globalAlpha = 1;
          ctx.drawImage(
            img,
            currentFrame * FRAME_W_PRECISE, 0,
            FRAME_W_PRECISE, FRAME_H,
            0, 0,
            displayW, displayH
          );
          currentFrame++;
          if (currentFrame >= USE_FRAMES) {
            completed = true;
            return;
          }
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    };

    img.onerror = () => {
      // If spritesheet.png not found, show a helpful message
      canvas.remove();
      const msg = document.createElement('div');
      msg.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#444;font-family:-apple-system,sans-serif;font-size:14px;text-align:center;line-height:1.8;';
      msg.innerHTML = 'spritesheet.png not found<br><span style="color:#333;font-size:12px;">Place spritesheet.png in the same folder as this file</span>';
      document.getElementById('stage').appendChild(msg);
    };
  }

  // Auto-play on load
  runAnimation();

  document.getElementById('replay-btn').addEventListener('click', () => {
    animActive = false;
    setTimeout(runAnimation, 50);
  });
</script>
</body>
</html>
