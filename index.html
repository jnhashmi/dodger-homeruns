<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dodger HRs">
  <meta name="theme-color" content="#000000">
  <title>Dodger Home Runs 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --side-padding: max(env(safe-area-inset-left), 24px);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Bricolage Grotesque', -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding-top: max(env(safe-area-inset-top), 20px);
      padding-bottom: max(env(safe-area-inset-bottom), 40px);
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2em;
      padding-left: var(--side-padding);
      padding-right: var(--side-padding);
    }

    #title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.1px;
      color: #fff;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #last-updated {
      font-size: 11px;
      color: #666;
    }

    #sort-btn {
      background: none;
      border: none;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #player-list { width: 100%; }

    .player-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid #2e2e2e;
      padding-left: var(--side-padding);
      padding-right: var(--side-padding);
      height: 44px;
      gap: 14px;
    }

    .player-name {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      width: 190px;
      min-width: 190px;
      white-space: nowrap;
      letter-spacing: -0.1px;
    }

    .tick-area {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(62, 1fr);
      gap: 4px; 
      height: 100%;
      align-items: center;
      overflow: visible; /* Changed from hidden/auto to ensure visibility */
    }

    .tick {
      background: #0977cc;
      height: 70%; 
      width: 100%;
    }

    .tick-empty {
      width: 100%;
      height: 70%;
      background: transparent;
    }

    .hr-count {
      font-size: 18px;
      font-weight: 400;
      color: #fff;
      min-width: 32px;
      text-align: right;
    }

    #status-msg {
      color: #666;
      font-size: 13px;
      text-align: center;
      margin-top: 48px;
      padding: 0 24px;
    }

    @media (orientation: portrait) {
      #title { font-size: 15px; }
      .player-name { font-size: 15px; width: 130px; min-width: 130px; }
      .tick-area { gap: 2px; } /* Slightly tighter for portrait fit */
      #status-msg::after {
        content: "Best viewed in Landscape";
        display: block;
        margin-top: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">Dodger Home Runs 2026</div>
    <div id="header-right">
      <span id="last-updated">––:––</span>
      <button id="sort-btn" aria-label="Toggle sort order">
        <svg width="28" height="22" viewBox="0 0 28 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8.5" cy="5.5" r="2.5" stroke="#ffffff" stroke-width="1.6"/>
          <line x1="2" y1="5.5" x2="6" y2="5.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="11" y1="5.5" x2="26" y2="5.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="19.5" cy="16.5" r="2.5" stroke="#ffffff" stroke-width="1.6"/>
          <line x1="2" y1="16.5" x2="17" y2="16.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="22" y1="16.5" x2="26" y2="16.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="player-list"></div>
  <div id="status-msg"></div>
</div>

<script>
  const TEAM_ID = 119;
  const SEASON = 2026;
  const POLL_MS = 60000;
  const MAX_TICKS = 62;

  const PLACEHOLDER = [
    { name: 'Shohei Ohtani',       hr: 5 },
    { name: 'Andy Pages',          hr: 5 },
    { name: 'Max Muncy',           hr: 4 },
    { name: 'Dalton Rushing',      hr: 3 },
    { name: 'Freddie Freeman',     hr: 3 },
    { name: 'Teoscar Hernández',   hr: 3 },
    { name: 'Will Smith',          hr: 2 },
    { name: 'Alex Freeland',       hr: 1 },
    { name: 'Miguel Rojas',        hr: 1 },
    { name: 'Santiago Espinal',    hr: 0 },
    { name: 'Kyle Tucker',         hr: 0 },
    { name: 'Tommy Edman',         hr: 0 },
  ];

  let sortMode = 'most';
  let players = [];
  let animating = false;

  function formatTime(d) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function sortPlayers(list, mode) {
    const copy = [...list];
    if (mode === 'most') {
      copy.sort((a, b) => b.hr - a.hr || a.name.localeCompare(b.name));
    } else {
      copy.sort((a, b) => a.name.localeCompare(b.name));
    }
    return copy;
  }

  function renderList(sorted) {
    const container = document.getElementById('player-list');
    container.innerHTML = '';
    sorted.forEach(p => {
      const row = document.createElement('div');
      row.className = 'player-row';
      row.dataset.name = p.name;

      const nameEl = document.createElement('div');
      nameEl.className = 'player-name';
      nameEl.textContent = p.name;

      const tickArea = document.createElement('div');
      tickArea.className = 'tick-area';
      for (let i = 0; i < MAX_TICKS; i++) {
        const cell = document.createElement('div');
        cell.className = i < p.hr ? 'tick' : 'tick-empty';
        tickArea.appendChild(cell);
      }

      const countEl = document.createElement('div');
      countEl.className = 'hr-count';
      countEl.textContent = p.hr;

      row.appendChild(nameEl);
      row.appendChild(tickArea);
      row.appendChild(countEl);
      container.appendChild(row);
    });
  }

  async function fetchData() {
    try {
      const url = `https://statsapi.mlb.com/api/v1/teams/${TEAM_ID}/roster?rosterType=active&season=${SEASON}&hydrate=person(stats(type=season,season=${SEASON},group=hitting))`;
      const res = await fetch(url);
      const data = await res.json();
      return (data.roster || [])
        .filter(p => {
          const pos = p.position?.abbreviation || '';
          const name = p.person?.fullName || '';
          return pos !== 'P' || name === 'Shohei Ohtani';
        })
        .map(p => {
          const stat = p.person?.stats?.[0]?.splits?.[0]?.stat;
          return { name: p.person?.fullName || 'Unknown', hr: stat?.homeRuns ?? 0 };
        });
    } catch (e) { return null; }
  }

  async function refresh() {
    const updEl = document.getElementById('last-updated');
    const data = await fetchData();
    if (data && data.length > 0) {
      players = data;
      updEl.textContent = formatTime(new Date());
      renderList(sortPlayers(players, sortMode));
    }
  }

  document.getElementById('sort-btn').addEventListener('click', () => {
    sortMode = sortMode === 'most' ? 'alpha' : 'most';
    renderList(sortPlayers(players, sortMode));
  });

  players = PLACEHOLDER;
  renderList(sortPlayers(players, sortMode));
  refresh();
  setInterval(refresh, POLL_MS);
</script>
</body>
</html>
